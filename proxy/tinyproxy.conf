## airlock egress proxy (tinyproxy)
## Default-deny: a destination is blocked unless its host matches a line in
## /etc/tinyproxy/filter. Applies to both plain HTTP and HTTPS (CONNECT).

User tinyproxy
Group tinyproxy

Port 8888
Listen 0.0.0.0
Timeout 600

# Clients allowed to USE the proxy. The sandbox sits on a private docker
# network, so allow the RFC1918 ranges (docker bridge subnets live here).
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# ---- the whitelist ----
# FilterDefaultDeny Yes  => only hosts matching `filter` are permitted.
# Filter matches on the destination HOST (works for HTTPS CONNECT too).
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
# Match on host, not full URL (so HTTPS CONNECT is filtered by domain).
FilterURLs Off

# Allow HTTPS tunnelling only to the standard TLS ports.
ConnectPort 443
ConnectPort 563

# Keep logs visible via `docker logs` / `airlock logs`.
LogLevel Info

# Strip any inbound proxy creds; we don't use upstream auth.
DisableViaHeader Yes
